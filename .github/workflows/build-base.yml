name: Build Base Image

# ベースイメージ(Dockerfile.base)は手動実行時のみビルドして ECR に push する。
# PHP拡張・Apache設定・src など、変化の少ない基盤を更新したいときに実行する。
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push base image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_BASE_REPO: ${{ vars.ECR_BASE_REPO }}
        run: |
          # Dockerfile.base は docker/php/php.ini・docker/apache/000-default.conf・src を
          # COPY するため、ビルドコンテキストはリポジトリ root が必須。
          docker build \
            -f docker/php/Dockerfile.base \
            -t "$ECR_REGISTRY/$ECR_BASE_REPO:latest" \
            -t "$ECR_REGISTRY/$ECR_BASE_REPO:${GITHUB_SHA}" \
            .
          docker push "$ECR_REGISTRY/$ECR_BASE_REPO:latest"
          docker push "$ECR_REGISTRY/$ECR_BASE_REPO:${GITHUB_SHA}"
